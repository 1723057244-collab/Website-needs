<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面未找到 - 澳成照明 | Page Not Found</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#f5f6f8;color:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.wrap{padding:40px}
h1{font-size:80px;color:#c8963e;margin-bottom:10px;font-weight:300}
h2{font-size:22px;margin-bottom:16px;font-weight:400}
p{color:#777;margin-bottom:28px;font-size:14px}
a{display:inline-block;padding:13px 34px;background:#c8963e;color:#fff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px;transition:all .3s}
a:hover{background:#a67c2e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,150,62,0.3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>404</h1>
  <h2>页面未找到</h2>
  <p>您访问的页面不存在或已移除。请检查网址是否正确，或返回首页浏览其他内容。</p>
  <a href="/">返回首页</a>
</div>
</body>
</html>
